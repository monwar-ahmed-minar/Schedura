<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHEDURA | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body id="body1">
    <div class="container">
        <div class="auth-card">
            <div class="header">
                <h1 class="logo">SCHEDURA</h1>
                <p>Login to manage your appointments [cite: 78]</p>
            </div>

            <div class="tab-group">
                <button class="tab active">Login</button>
                <button class="tab" onclick="window.location.href='register.html'">Register</button>
            </div>

            <form id="login-form" class="auth-form" action="login_process.html" method="POST">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-pass" name="password" placeholder="Password" required>
                    <i class="fa-solid fa-eye-slash toggle-pass" onclick="togglePassword('login-pass', this)"></i>
                </div>
                <div class="form-footer">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="btn-gradient">Login</button>
            </form>

            <div class="social-divider">
                <span>Or continue with</span>
            </div>

            <div class="social-buttons">
                <button class="social-btn" type="button"><i class="fa-brands fa-google"></i></button>
                <button class="social-btn" type="button"><i class="fa-brands fa-facebook-f"></i></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
